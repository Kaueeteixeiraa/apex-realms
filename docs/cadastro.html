<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar Conta | Apex Realms</title>
  <meta name="description" content="Crie uma conta no Apex Realms como jogador ou mestre.">
  <meta name="theme-color" content="#07070c">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=register-neon-v3">
</head>
<body class="auth-static-page register-neon-page">
  <div class="page-noise"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <header class="auth-topbar">
    <a class="brand" href="index.html" aria-label="Apex Realms">
      <svg class="realm-mark" viewBox="0 0 64 64" aria-hidden="true"><path d="M32 4a28 28 0 1 0 28 28M46 10a28 28 0 0 1 10 19" fill="none" stroke="#a47cff" stroke-width="4"/><path d="m32 14 14 9v18l-14 9-14-9V23zM18 23l14 8 14-8M32 31v19" fill="none" stroke="#55dfff" stroke-width="2"/></svg>
      <span><b>APEX</b><em>REALMS</em></span>
    </a>
    <nav aria-label="Acesso rapido">
      <a href="index.html">Inicio</a>
      <a href="login.html">Entrar</a>
      <a class="btn btn-ghost btn-small" href="dashboard.html">Abrir plataforma</a>
    </nav>
  </header>

  <main class="register-neon-shell">
    <div class="register-corner-monster" aria-hidden="true">
      <span class="monster-aura"></span>
      <span class="monster-head"><i></i><b></b><em></em></span>
      <span class="monster-tentacle tentacle-one"></span>
      <span class="monster-tentacle tentacle-two"></span>
      <span class="monster-tentacle tentacle-three"></span>
      <span class="monster-tentacle tentacle-four"></span>
    </div>

    <div class="register-d20-relic" aria-hidden="true">
      <span class="relic-ring"></span>
      <span class="relic-d20">D20</span>
      <span class="relic-sword"></span>
      <span class="relic-spark spark-a"></span>
      <span class="relic-spark spark-b"></span>
    </div>

    <section class="auth-card register-center-card reveal">
      <small>CADASTRO</small>
      <h2>Criar conta</h2>
      <p>Informe seus dados para acessar o Apex Realms como jogador ou mestre. Depois, voce podera personalizar seu perfil dentro da plataforma.</p>

      <form class="auth-form" data-auth-form data-auth-mode="register" autocomplete="on">
        <div class="auth-form-grid">
          <label>Nome
            <input name="name" autocomplete="name" required>
          </label>
          <label>Apelido
            <input name="nickname" required>
          </label>
        </div>
        <label>E-mail
          <input name="email" type="email" autocomplete="email" required>
        </label>
        <label>Senha
          <input name="password" type="password" minlength="6" autocomplete="new-password" required>
        </label>
        <label>Perfil
          <select name="role" required>
            <option value="player">Jogador</option>
            <option value="master">Mestre</option>
          </select>
        </label>
        <button class="btn btn-primary btn-large" type="submit">Criar conta e acessar <span>&rarr;</span></button>
        <p class="auth-status" data-auth-status aria-live="polite"></p>
      </form>

      <p class="auth-switch">Ja tem conta? <a href="login.html">Entrar no Apex Realms</a></p>
    </section>
  </main>

  <script src="assets/js/app.js?v=29b3f08"></script>
  <script src="assets/js/auth.js?v=register-cleanup"></script>
</body>
</html>
