  <main class="preferences-content"><header class="preferences-topbar"><div><small class="master-eyebrow">Padroes da plataforma</small><h1>Configuracoes</h1><p>Defina apenas o comportamento inicial das suas campanhas e jogadores.</p></div></header>
    <form class="settings-essential-form" data-master-settings-form>
      <section><div class="preferences-section-heading"><div><small class="master-panel-kicker">Campanhas</small><h2>Padroes de criacao</h2></div></div><div class="settings-fields"><label><span>Sistema padrao</span><select name="defaultSystem"><option>D&D 5e</option><option>Tormenta 20</option><option>Pathfinder</option><option>Ordem Paranormal</option><option>Outro</option></select></label><label><span>Entrada por convite</span><select name="approvalMode"><option value="manual">Aprovacao manual</option><option value="automatic">Entrada automatica</option></select></label><label><span>Ficha inicial</span><select name="defaultSheetStatus"><option>Pendente</option><option>Aprovada</option></select></label></div></section>
      <section><div class="preferences-section-heading"><div><small class="master-panel-kicker">Durante a sessao</small><h2>Controle da mesa</h2></div></div><div class="settings-toggles"><label><span><b>Bloquear edicao de fichas</b><small>Impede alteracoes enquanto a sessao estiver ativa.</small></span><input type="checkbox" name="lockSheetsDuringSession"><i></i></label><label><span><b>Confirmar exclusoes importantes</b><small>Solicita confirmacao para campanhas e fichas.</small></span><input type="checkbox" name="confirmDestructive" checked><i></i></label></div></section>
      <section><div class="preferences-section-heading"><div><small class="master-panel-kicker">Novos jogadores</small><h2>Permissoes iniciais</h2></div></div><div class="settings-toggles two-columns"><label><span><b>Rolar dados</b><small>Acesso aos dados da mesa.</small></span><input type="checkbox" name="defaultRollDice" checked><i></i></label><label><span><b>Usar chat</b><small>Participar do chat da sessao.</small></span><input type="checkbox" name="defaultUseChat" checked><i></i></label><label><span><b>Mover proprio token</b><small>Controlar apenas o personagem vinculado.</small></span><input type="checkbox" name="defaultMoveToken" checked><i></i></label><label><span><b>Ver biblioteca liberada</b><small>Acessar conteudo compartilhado.</small></span><input type="checkbox" name="defaultViewLibrary" checked><i></i></label></div></section>
      <footer><button class="master-btn" type="submit">Salvar configuracoes</button></footer>
