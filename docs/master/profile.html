  <main class="preferences-content">
    <header class="preferences-topbar"><div><small class="master-eyebrow">Identidade do narrador</small><h1>Perfil do Mestre</h1><p>Apresente sua experiencia, seus sistemas e o estilo das suas mesas.</p></div></header>
    <section class="profile-layout">
      <aside class="master-profile-preview"><div class="profile-avatar-large" data-profile-avatar><span data-profile-initial>M</span></div><label>Enviar retrato<input type="file" accept="image/*" data-profile-photo></label><small>JPG, PNG ou WEBP.</small><h2 data-profile-preview-name>Mestre Apex</h2><p data-profile-preview-title>Narrador de mundos</p><div><span><b data-profile-campaigns>0</b><small>Campanhas</small></span><span><b data-profile-experience>0</b><small>Anos mestrando</small></span></div></aside>
      <form class="profile-form" data-master-profile-form>
        <div class="preferences-section-heading"><div><small class="master-panel-kicker">Apresentacao</small><h2>Quem conduz a aventura</h2></div><span>Visivel para jogadores convidados</span></div>
        <div class="profile-form-grid"><label><span>Nome publico</span><input name="displayName" required maxlength="60"></label><label><span>Titulo do perfil</span><input name="title" maxlength="80" placeholder="Ex.: Mestre de fantasia sombria"></label><label><span>Idade</span><input name="age" type="number" min="18" max="120"></label><label><span>Anos de experiencia</span><input name="experienceYears" type="number" min="0" max="80"></label><label class="wide"><span>Sistemas que mestra</span><input name="systems" maxlength="160" placeholder="D&D 5e, Tormenta 20, Ordem Paranormal..."></label><label class="wide"><span>Qualidades como Mestre</span><textarea name="qualities" maxlength="400" placeholder="Narrativa, improvisacao, combate tatico, interpretacao..."></textarea></label><label class="wide"><span>Estilo das mesas</span><textarea name="style" maxlength="500" placeholder="Descreva ritmo, temas, equilibrio entre interpretacao e combate."></textarea></label><label><span>Disponibilidade</span><input name="availability" maxlength="120" placeholder="Ex.: Sextas a noite"></label><label><span>Experiencia preferida</span><select name="experience"><option>Iniciantes e veteranos</option><option>Iniciantes</option><option>Veteranos</option></select></label><label class="wide"><span>Sobre mim</span><textarea name="bio" maxlength="600" placeholder="Uma apresentacao curta para seus jogadores."></textarea></label></div>
        <footer><button class="master-btn" type="submit">Salvar perfil</button></footer>
      </form>
    </section>
